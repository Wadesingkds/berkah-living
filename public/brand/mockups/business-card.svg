<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  
  <!-- Front Side -->
  <g transform="translate(450, 275)">
    <!-- Decorative elements -->
    <circle cx="-350" cy="-150" r="100" fill="#C0633E" opacity="0.05"/>
    <circle cx="350" cy="150" r="120" fill="#D4A041" opacity="0.05"/>
    
    <!-- Logo -->
    <g transform="translate(-350, -180)">
      <circle cx="0" cy="0" r="40" fill="url(#logoGradient)"/>
      <g transform="translate(0, -6)">
        <path d="M0,-20 C-11,-20 -20,-11 -20,0 C-20,11 0,30 0,30 C0,30 20,11 20,0 C20,-11 11,-20 0,-20 Z" 
              fill="#5C7C58" stroke="#F4E4BC" stroke-width="3"/>
        <g transform="translate(0, -4)">
          <path d="M-10,0 L0,-8 L10,0 Z" fill="#F4E4BC"/>
          <rect x="-8" y="0" width="16" height="12" fill="#F4E4BC"/>
          <rect x="-2" y="5" width="4" height="6" fill="#C0633E"/>
          <circle cx="0" cy="2" r="1" fill="#D4A041"/>
        </g>
      </g>
    </g>
    <text x="-290" y="-160" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="32" font-weight="700" fill="#2D3748">LocalHub</text>
    <text x="-290" y="-130" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="14" fill="#718096">Belanja Lokal, Mudah Digital</text>
    
    <!-- Contact Info -->
    <g transform="translate(-350, -50)">
      <text x="0" y="0" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="18" font-weight="600" fill="#2D3748">PT LocalHub Indonesia</text>
      <text x="0" y="25" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="14" fill="#718096">Jl. Merdeka No. 123, Jakarta Selatan</text>
      <text x="0" y="45" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="14" fill="#718096">Telp: (021) 1234-5678</text>
      <text x="0" y="65" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="14" fill="#718096">Email: info@localhub.id</text>
      <text x="0" y="85" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="14" fill="#718096">Web: www.localhub.id</text>
    </g>
    
    <!-- QR Code Placeholder -->
    <rect x="250" y="-180" width="100" height="100" fill="#2D3748" opacity="0.1"/>
    <text x="300" y="-70" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="12" fill="#718096">Scan untuk aplikasi</text>
    
    <!-- Bottom Branding -->
    <g transform="translate(-350, 120)">
      <rect x="0" y="0" width="700" height="4" rx="2" fill="url(#brandGradient)"/>
      <text x="350" y="30" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="12" fill="#718096">Support UMKM Sekitar</text>
    </g>
  </g>
  
  <!-- Back Side -->
  <g transform="translate(450, 275)">
    <rect x="360" y="-275" width="540" height="550" rx="12" fill="#F4E4BC" opacity="0.3"/>
    
    <!-- Back Logo -->
    <g transform="translate(630, -180)">
      <circle cx="0" cy="0" r="30" fill="url(#logoGradient)"/>
      <g transform="translate(0, -5)">
        <path d="M0,-15 C-8,-15 -15,-8 -15,0 C-15,8 0,22 0,22 C0,22 15,8 15,0 C15,-8 8,-15 0,-15 Z" 
              fill="#5C7C58" stroke="#F4E4BC" stroke-width="2"/>
        <g transform="translate(0, -3)">
          <path d="M-7,0 L0,-6 L7,0 Z" fill="#F4E4BC"/>
          <rect x="-6" y="0" width="12" height="8" fill="#F4E4BC"/>
          <rect x="-2" y="4" width="4" height="4" fill="#C0633E"/>
          <circle cx="0" cy="2" r="1" fill="#D4A041"/>
        </g>
      </g>
    </g>
    <text x="680" y="-165" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="24" font-weight="700" fill="#2D3748">LocalHub</text>
    
    <!-- Social Media Icons -->
    <g transform="translate(630, -100)">
      <circle cx="0" cy="0" r="25" fill="#C0633E"/>
      <text x="0" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#FFFFFF">f</text>
      <circle cx="60" cy="0" r="25" fill="#C0633E"/>
      <text x="60" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#FFFFFF">t</text>
      <circle cx="120" cy="0" r="25" fill="#C0633E"/>
      <text x="120" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#FFFFFF">ig</text>
      <circle cx="180" cy="0" r="25" fill="#C0633E"/>
      <text x="180" y="8" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#FFFFFF">li</text>
    </g>
    
    <!-- Tagline -->
    <text x="630" y="-30" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="20" font-weight="600" fill="#2D3748">Belanja Lokal, Mudah Digital</text>
    <text x="630" y="0" text-anchor="middle" font-family="Plus Jakarta Sans, system-ui, sans-serif" font-size="14" fill="#718096">www.localhub.id</text>
  </g>
  
  <!-- Logo Gradient Definition -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0633E"/>
      <stop offset="100%" style="stop-color:#D4A041"/>
    </linearGradient>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C0633E"/>
      <stop offset="100%" style="stop-color:#D4A041"/>
    </linearGradient>
  </defs>
</svg>
