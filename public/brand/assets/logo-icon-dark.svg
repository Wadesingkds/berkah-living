<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C0633E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A041;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="128" cy="128" r="120" fill="url(#iconGradientDark)"/>
  
  <!-- Location pin with house -->
  <g transform="translate(128, 90)">
    <!-- Pin shape -->
    <path d="M0,-40 C-22,-40 -40,-22 -40,0 C-40,22 0,60 0,60 C0,60 40,22 40,0 C40,-22 22,-40 0,-40 Z" 
          fill="#5C7C58" stroke="#F4E4BC" stroke-width="4"/>
    
    <!-- House inside pin -->
    <g transform="translate(0, -10)">
      <!-- Roof -->
      <path d="M-15,0 L0,-12 L15,0 Z" fill="#F4E4BC"/>
      <!-- Body -->
      <rect x="-12" y="0" width="24" height="20" fill="#F4E4BC"/>
      <!-- Door -->
      <rect x="-4" y="8" width="8" height="12" fill="#C0633E"/>
      <!-- Window -->
      <circle cx="0" cy="4" r="2" fill="#D4A041"/>
    </g>
  </g>
</svg>
