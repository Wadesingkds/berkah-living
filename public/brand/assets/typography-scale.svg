<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="20" font-weight="700" fill="#2D3748">Typography Scale</text>
  <text x="300" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#718096">Font Family: Plus Jakarta Sans</text>
  
  <!-- H1 -->
  <text x="50" y="100" font-family="system-ui, sans-serif" font-size="48" font-weight="700" fill="#2D3748">H1 - Hero Title</text>
  <text x="500" y="100" font-family="monospace" font-size="10" fill="#718096">48px / 700</text>
  
  <!-- H2 -->
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#2D3748">H2 - Section Title</text>
  <text x="500" y="150" font-family="monospace" font-size="10" fill="#718096">36px / 700</text>
  
  <!-- H3 -->
  <text x="50" y="195" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#2D3748">H3 - Subsection Title</text>
  <text x="500" y="195" font-family="monospace" font-size="10" fill="#718096">24px / 600</text>
  
  <!-- H4 -->
  <text x="50" y="235" font-family="system-ui, sans-serif" font-size="20" font-weight="600" fill="#2D3748">H4 - Card Title</text>
  <text x="500" y="235" font-family="monospace" font-size="10" fill="#718096">20px / 600</text>
  
  <!-- Divider -->
  <line x1="50" y1="260" x2="550" y2="260" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Body Large -->
  <text x="50" y="290" font-family="system-ui, sans-serif" font-size="18" font-weight="400" fill="#2D3748">Body Large - Intro text atau paragraf penting</text>
  <text x="500" y="290" font-family="monospace" font-size="10" fill="#718096">18px / 400</text>
  
  <!-- Body -->
  <text x="50" y="325" font-family="system-ui, sans-serif" font-size="16" font-weight="400" fill="#2D3748">Body - Teks utama untuk konten deskriptif dan artikel</text>
  <text x="500" y="325" font-family="monospace" font-size="10" fill="#718096">16px / 400</text>
  
  <!-- Body Small -->
  <text x="50" y="355" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#718096">Body Small - Secondary text, metadata, atau info tambahan</text>
  <text x="500" y="355" font-family="monospace" font-size="10" fill="#718096">14px / 400</text>
  
  <!-- Caption -->
  <text x="50" y="385" font-family="system-ui, sans-serif" font-size="12" font-weight="400" fill="#718096">Caption - Label, timestamp, dan teks kecil lainnya</text>
  <text x="500" y="385" font-family="monospace" font-size="10" fill="#718096">12px / 400</text>
  
  <!-- Divider -->
  <line x1="50" y1="410" x2="550" y2="410" stroke="#E2E8F0" stroke-width="1"/>
  
  <!-- Button Text Example -->
  <text x="50" y="440" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#2D3748">Button Text</text>
  <rect x="160" y="425" width="120" height="32" rx="6" fill="#C0633E"/>
  <text x="220" y="446" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">Mulai Belanja</text>
  <text x="500" y="440" font-family="monospace" font-size="10" fill="#718096">14px / 600</text>
  
  <!-- Link Example -->
  <text x="50" y="480" font-family="system-ui, sans-serif" font-size="14" font-weight="400" fill="#C0633E" text-decoration="underline">Link Text</text>
  <text x="120" y="480" font-family="monospace" font-size="10" fill="#718096">14px / 400 / #C0633E</text>
</svg>
